services:
  - type: web
    name: pxg-files-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_REFRESH_SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: ADMIN_TOKEN_TTL_SECONDS
        value: "43200"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OCR_MAX_FILES
        value: "10"
      - key: OCR_MAX_FILE_SIZE_MB
        value: "8"
      - key: OCR_IMAGE_TIMEOUT_SECONDS
        value: "15"
      - key: CATALOG_STORAGE
        value: "database"

  - type: web
    name: pxg-files-frontend
    env: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
